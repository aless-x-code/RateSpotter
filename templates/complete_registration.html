{% extends 'header.html' %}
 
{% block styles %}
<link
  type="text/css"
  rel="stylesheet"
  href="{{ url_for('static', filename='form.css') }}"
/>
{% endblock %} 


{% block content %}
<div class="complete_registration">
    <h2>Complete Registration</h2>
   
    <form method="POST" action="{{ url_for('ratespotter_blueprint.complete_registration') }}">
        
        <input type="hidden" name="restaurant_id" value="{{ restaurant.location_id }}">

        <p>{{ restaurant.name }} - {{ restaurant.address }}</p>

        <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Register</button>
    </form>
</div>
{% endblock %}
